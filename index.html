<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ふくらませ！ぶんしょうクエスト</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; }
  body {
    font-family:"Hiragino Maru Gothic ProN","BIZ UDPGothic","Yu Gothic","YuGothic",sans-serif;
    background:#fdf6e3;
    color:#4a3f35;
    font-size:22px;
    line-height:1.9;
    -webkit-user-select:none; user-select:none;
    touch-action:manipulation;
  }
  ruby rt { font-size:0.45em; color:#8a7b6c; }
  #app { max-width:820px; margin:0 auto; padding:16px 16px 40px; }

  .top-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .home-btn {
    background:#fff; border:3px solid #e0d5c0; border-radius:16px;
    font-size:20px; padding:8px 18px; font-family:inherit; color:#4a3f35;
  }
  .star-box { background:#fff; border:3px solid #ffd166; border-radius:16px; padding:6px 16px; font-size:20px; }

  h1.title { text-align:center; font-size:34px; margin:20px 0 6px; color:#e07a3f; }
  .subtitle { text-align:center; font-size:18px; color:#8a7b6c; margin-bottom:24px; }

  .menu { display:flex; flex-direction:column; gap:16px; }
  .big-btn {
    display:flex; align-items:center; gap:16px;
    background:#fff; border:4px solid #f0b429; border-radius:24px;
    padding:18px 22px; font-size:26px; font-family:inherit; color:#4a3f35;
    box-shadow:0 4px 0 #e0c48a; text-align:left; width:100%;
  }
  .big-btn:active { transform:translateY(3px); box-shadow:0 1px 0 #e0c48a; }
  .big-btn .icon { font-size:44px; }
  .big-btn .desc { font-size:16px; color:#8a7b6c; display:block; }
  .big-btn.m1 { border-color:#6fb1e0; box-shadow:0 4px 0 #a8cbe0; }
  .big-btn.m2 { border-color:#f08c8c; box-shadow:0 4px 0 #e0b0b0; }
  .big-btn.m3 { border-color:#8fce8f; box-shadow:0 4px 0 #b5d6b5; }
  .big-btn.m4 { border-color:#c39be0; box-shadow:0 4px 0 #d4c0e0; }
  .big-btn.m5 { border-color:#5bc8b8; box-shadow:0 4px 0 #a8d8d0; }

  /* --- coach (mode4) --- */
  textarea.write-area {
    width:100%; min-height:180px; font-family:inherit; font-size:24px; line-height:1.9;
    border:3px solid #5bc8b8; border-radius:18px; padding:14px; background:#fff; color:#4a3f35;
    -webkit-user-select:text; user-select:text;
  }
  .badge-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
  .badge {
    background:#fff; border:3px solid #e0d5c0; border-radius:16px;
    text-align:center; padding:8px 4px; font-size:15px; color:#b9ac99;
  }
  .badge.on { border-color:#f0b429; background:#fff8dc; color:#4a3f35; }
  .badge .b-icon { font-size:26px; display:block; }
  .find-line { background:#fffdf5; border-left:6px solid #8fce8f; border-radius:8px; padding:8px 12px; margin:8px 0; font-size:20px; }
  .chance-line { background:#fffdf5; border-left:6px solid #f0b429; border-radius:8px; padding:8px 12px; margin:8px 0; font-size:20px; }

  .card {
    background:#fff; border-radius:24px; padding:20px 22px; margin-bottom:16px;
    border:3px solid #ece2cf;
  }
  .rule-tip {
    background:#fff8dc; border:3px dashed #f0b429; border-radius:18px;
    padding:12px 18px; font-size:19px; margin-bottom:16px;
  }

  /* --- mode1 punctuation --- */
  .sentence-area { font-size:28px; line-height:2.4; text-align:center; padding:10px 0; }
  .chunk { display:inline-block; margin:0 5px; }
  .gap-btn {
    display:inline-block; width:48px; height:48px; vertical-align:middle;
    border:3px dashed #b9a88f; border-radius:50%; background:#fdf6e3;
    margin:0 3px; font-family:inherit;
  }
  .gap-btn:active { background:#ffe9b3; }
  .placed { color:#e0563f; font-weight:bold; }
  .tray {
    text-align:center; font-size:22px; margin:14px 0;
    background:#eef6fc; border-radius:18px; padding:12px;
  }
  .tray .sym {
    display:inline-block; font-size:34px; font-weight:bold; color:#e0563f;
    background:#fff; border:3px solid #6fb1e0; border-radius:14px;
    padding:2px 18px; margin-left:10px;
  }
  .shake { animation:shake .4s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }

  /* --- genkouyoushi (masu) grid : vertical, right to left --- */
  .masu-wrap { display:flex; flex-direction:row-reverse; justify-content:center; gap:8px; overflow-x:auto; padding:12px 4px; }
  .masu-col { display:flex; flex-direction:column; }
  .masu {
    width:44px; height:44px; border:2px solid #bcd0de; background:#fff;
    display:flex; align-items:center; justify-content:center;
    font-size:26px; position:relative; margin-top:-2px;
  }
  .masu.small { width:27px; height:27px; font-size:16px; }
  .masu.blank { background:#fff8dc; border:2px dashed #e0a63f; }
  .masu.blank:active { background:#ffe9b3; }
  .masu.ok { background:#e0f5d8; border:2px solid #6bb56b; color:#e0563f; font-weight:bold; }
  .masu .tr { position:absolute; top:2px; right:4px; font-size:0.8em; }
  .masu .rot { transform:rotate(90deg); display:inline-block; }
  .sym-tray { display:flex; justify-content:center; gap:14px; margin:14px 0 6px; }
  .sym-btn {
    width:66px; height:66px; font-size:30px; font-family:inherit; font-weight:bold;
    background:#fff; border:3px solid #6fb1e0; border-radius:16px; color:#e0563f;
    box-shadow:0 3px 0 #a8cbe0;
  }
  .sym-btn.sel { background:#d6eaff; border-color:#2f7bbf; transform:scale(1.12); }
  .grid-choice { display:flex; gap:16px; justify-content:center; flex-wrap:wrap; }
  .grid-choice button {
    background:#fff; border:4px solid #f0b429; border-radius:18px;
    padding:10px 14px; font-family:inherit; font-size:22px; color:#4a3f35;
    box-shadow:0 3px 0 #e0c48a;
  }
  .grid-choice button:active { transform:translateY(2px); }
  .char { display:inline-block; font-size:30px; }
  .cert {
    border:6px double #e0a63f; background:#fffdf0; border-radius:14px;
    padding:30px 22px; text-align:center;
  }

  /* --- mode2 story builder --- */
  .story-box {
    background:#fff; border:3px solid #f0d9b5; border-radius:22px;
    padding:18px 22px; font-size:24px; margin-bottom:14px;
  }
  .story-box .line { display:block; margin:2px 0; }
  .hl { border-radius:8px; padding:0 4px; font-weight:bold; }
  .c1 { background:#ffe0b3; } /* なかま */
  .c2 { background:#ffd6e0; } /* いろ・かたち */
  .c3 { background:#d6eaff; } /* かず */
  .c4 { background:#e0f5d8; } /* おと・ようす */
  .c5 { background:#f3e0ff; } /* かぎの ことば */
  .c6 { background:#fff3b3; } /* きもち */

  .balloon-row { display:flex; align-items:flex-end; justify-content:center; gap:20px; margin:8px 0 14px; height:150px; }
  .balloon {
    font-size:60px; transition:transform .5s cubic-bezier(.34,1.56,.64,1);
    transform-origin:bottom center;
  }
  .meter-wrap { flex:0 0 200px; }
  .meter-label { font-size:16px; color:#8a7b6c; text-align:center; }
  .meter { background:#eee3cf; border-radius:12px; height:24px; overflow:hidden; border:2px solid #d8c9ab; }
  .meter > div { background:linear-gradient(90deg,#f0b429,#e07a3f); height:100%; width:0%; transition:width .5s; }

  .q-card { background:#fff; border:4px solid #f08c8c; border-radius:22px; padding:16px 20px; }
  .cat-chip {
    display:inline-block; background:#f08c8c; color:#fff; border-radius:999px;
    padding:2px 16px; font-size:17px; margin-bottom:8px;
  }
  .q-text { font-size:25px; margin-bottom:12px; }
  .opts { display:flex; flex-direction:column; gap:12px; }
  .opt-btn {
    background:#fffdf5; border:3px solid #f0b429; border-radius:18px;
    padding:14px 18px; font-size:23px; font-family:inherit; color:#4a3f35;
    text-align:left; box-shadow:0 3px 0 #e0c48a;
  }
  .opt-btn:active { transform:translateY(2px); box-shadow:0 1px 0 #e0c48a; }

  .final-story {
    background:#fff; border:4px solid #f0b429; border-radius:24px;
    padding:24px 28px; font-size:26px; line-height:2.3;
  }
  .stars-earned { text-align:center; font-size:34px; margin:14px 0; }

  /* --- mode3 kimochi quiz --- */
  .scene-card {
    background:#fff; border:4px solid #8fce8f; border-radius:22px;
    padding:20px; text-align:center; margin-bottom:16px;
  }
  .scene-emoji { font-size:56px; }
  .scene-text { font-size:26px; margin-top:6px; }
  .family-box {
    background:#e0f5d8; border-radius:18px; padding:14px 18px; margin-top:14px;
    font-size:21px;
  }

  /* --- zukan --- */
  .zukan-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .zukan-card {
    background:#fff; border:3px solid #c39be0; border-radius:18px;
    padding:14px; font-size:21px; min-height:110px;
  }
  .zukan-card.locked { border-color:#d8cfc0; color:#b9ac99; text-align:center; font-size:34px; display:flex; align-items:center; justify-content:center; }
  .zukan-word { font-size:23px; font-weight:bold; color:#7a4fa0; }
  .zukan-family { font-size:17px; color:#8a7b6c; margin-top:4px; }

  .center { text-align:center; }
  .next-btn {
    background:#e07a3f; color:#fff; border:none; border-radius:20px;
    font-size:26px; font-family:inherit; padding:14px 40px; margin-top:16px;
    box-shadow:0 4px 0 #a85a2d;
  }
  .next-btn:active { transform:translateY(3px); box-shadow:0 1px 0 #a85a2d; }
  .toast {
    position:fixed; left:50%; top:38%; transform:translate(-50%,-50%) scale(0);
    background:#fff; border:4px solid #f0b429; border-radius:26px;
    padding:20px 44px; font-size:34px; z-index:50; pointer-events:none;
    transition:transform .35s cubic-bezier(.34,1.56,.64,1);
  }
  .toast.show { transform:translate(-50%,-50%) scale(1); }
  .confetti-piece { position:fixed; top:-40px; font-size:30px; z-index:40; pointer-events:none; animation:fall 2.2s linear forwards; }
  @keyframes fall { to { transform:translateY(110vh) rotate(360deg); opacity:.6; } }
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>

<script>
"use strict";

/* ---------- storage ---------- */
function loadSave(){
  const def = { stars:0, zukan:[], m1done:{ kihon:false, ten:false, masu:false } };
  try {
    const p = JSON.parse(localStorage.getItem("sakubun-quest")) || {};
    return { ...def, ...p, m1done:{ ...def.m1done, ...(p.m1done||{}) } };
  } catch(e){ return def; }
}
function persist(){
  try { localStorage.setItem("sakubun-quest", JSON.stringify(save)); } catch(e){}
}
let save = loadSave();

const app = document.getElementById("app");
const R = (kanji, yomi) => `<ruby>${kanji}<rt>${yomi}</rt></ruby>`;

/* ---------- shared ui ---------- */
function topBar(){
  return `<div class="top-bar">
    <button class="home-btn" onclick="renderHome()">🏠 ホームに もどる</button>
    <div class="star-box">⭐ ${save.stars}</div>
  </div>`;
}
function toast(msg){
  const t = document.getElementById("toast");
  t.innerHTML = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 1000);
}
function confetti(){
  const emojis = ["🎉","⭐","🌸","✨","🎈"];
  for(let i=0;i<18;i++){
    const s = document.createElement("span");
    s.className = "confetti-piece";
    s.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    s.style.left = (Math.random()*100) + "vw";
    s.style.animationDelay = (Math.random()*0.6)+"s";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(), 3200);
  }
}
function addStars(n){ save.stars += n; persist(); }
function escapeHtml(s){
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
const ttsOk = ("speechSynthesis" in window);
function speak(text){
  if(!ttsOk) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "ja-JP"; u.rate = 0.85;
  const v = speechSynthesis.getVoices().find(v => v.lang && v.lang.startsWith("ja"));
  if(v) u.voice = v;
  speechSynthesis.speak(u);
}

/* ---------- home ---------- */
function renderHome(){
  if(ttsOk) speechSynthesis.cancel();
  app.innerHTML = `
    <div class="top-bar"><span></span><div class="star-box">⭐ ${save.stars}</div></div>
    <h1 class="title">ふくらませ！ぶんしょうクエスト</h1>
    <p class="subtitle">いそがなくて いいよ。たくさん ふくらませた ひとが めいじんだ！</p>
    <div class="menu">
      <button class="big-btn m2" onclick="startMode2()">
        <span class="icon">🎈</span>
        <span>ぶんしょう ふくらませ
          <span class="desc">スカスカの ぶんしょうを、カードで どんどん ふくらませよう</span>
        </span>
      </button>
      <button class="big-btn m1" onclick="startMode1()">
        <span class="icon">✏️</span>
        <span>まる・てん・かぎ めいじん
          <span class="desc">きょうかしょ「${R("丸","まる")}、${R("点","てん")}、かぎ」と おなじ もんだいだよ</span>
        </span>
      </button>
      <button class="big-btn m5" onclick="startMode4()">
        <span class="icon">👓</span>
        <span>じぶんの ぶんで ちょうせん
          <span class="desc">かいた ぶんしょうを ふくらむせんせいが みてくれるよ</span>
        </span>
      </button>
      <button class="big-btn m3" onclick="startMode3()">
        <span class="icon">💗</span>
        <span>きもちことば あつめ
          <span class="desc">「たのしかった」だけじゃない ことばを あつめよう</span>
        </span>
      </button>
      <button class="big-btn m4" onclick="renderZukan()">
        <span class="icon">📖</span>
        <span>きもちことば ずかん
          <span class="desc">あつめた ことばを ${R("見","み")}てみよう</span>
        </span>
      </button>
    </div>`;
}

/* =========================================================
   MODE 1 : まる・てん・かぎ
   ========================================================= */
const m1Questions = [
  {
    rule: `<b>${R("丸","まる")}（。）</b>は、${R("文","ぶん")}の おわりに つけます。`,
    parts: ["あさ","おきました","それから","かおを","あらいました"],
    placements: [ {sym:"。", pos:2}, {sym:"。", pos:5} ],
    praise: `${R("文","ぶん")}の おわりが よく わかったね！`
  },
  {
    rule: `<b>${R("点","てん")}（、）</b>は、${R("文","ぶん")}の ${R("中","なか")}の ${R("切","き")}れ${R("目","め")}に つけます。`,
    parts: ["きのう","ぼくは","どうぶつえんへ","いきました。"],
    placements: [ {sym:"、", pos:1} ],
    praise: "「きのう、」で ひとやすみ。よみやすく なったね！"
  },
  {
    rule: `<b>${R("点","てん")}（、）</b>が あると、${R("文","ぶん")}が よみやすく なるね。`,
    parts: ["はしって いたら","ころんで","しまいました。"],
    placements: [ {sym:"、", pos:1} ],
    praise: "そのとおり！ きれめに 、を おけたね。"
  },
  {
    rule: `<b>かぎ（「」）</b>は、${R("人","ひと")}の ${R("話","はな")}した ことば（${R("会話","かいわ")}）に つけます。`,
    parts: ["おかあさんが、","おはよう","と いいました。"],
    placements: [ {sym:"「", pos:1}, {sym:"」", pos:2} ],
    praise: "はなした ことばが 「」で はっきり したね！"
  },
  {
    rule: `さいごの もんだい！ <b>。、「」</b> ぜんぶ つかうよ。`,
    parts: ["おとうさんが","いってきます","と いいました"],
    placements: [ {sym:"、", pos:1}, {sym:"「", pos:1}, {sym:"。", pos:2}, {sym:"」", pos:2}, {sym:"。", pos:3} ],
    praise: "すごい！ きみは まる・てん・かぎ めいじんだ！"
  }
];
let m1 = null;
let tb = null;
let mc = null;

function startMode1(){ renderM1Hub(); }

function renderM1Hub(){
  const d = save.m1done;
  const all = d.kihon && d.ten && d.masu;
  app.innerHTML = `
    ${topBar()}
    <h1 class="title" style="font-size:28px;">✏️ まる・てん・かぎ めいじんへの みち</h1>
    <p class="subtitle">きょうかしょ「${R("丸","まる")}、${R("点","てん")}、かぎ」の しゅぎょうだ！</p>
    <div class="menu">
      <button class="big-btn m1" onclick="startM1Kihon()">
        <span class="icon">${d.kihon ? "✅" : "1️⃣"}</span>
        <span>きほんの もんだい
          <span class="desc">。、「」を ただしい ところに おこう</span></span>
      </button>
      <button class="big-btn m1" onclick="startM1Ten()">
        <span class="icon">${d.ten ? "✅" : "2️⃣"}</span>
        <span>いみが かわる！${R("点","てん")}
          <span class="desc">、の ばしょで いみが かわっちゃう！？</span></span>
      </button>
      <button class="big-btn m1" onclick="startM1Masu()">
        <span class="icon">${d.masu ? "✅" : "3️⃣"}</span>
        <span>ます${R("目","め")}に かこう
          <span class="desc">。、「」は ${R("一","ひと")}ますに かくよ</span></span>
      </button>
      ${all ? `<button class="big-btn m4" onclick="renderM1Cert()">
        <span class="icon">🏆</span><span>めいじん にんていしょう</span></button>` : ""}
    </div>`;
}

function startM1Kihon(){
  m1 = { qIdx:0, pIdx:0, placedAt:{} };
  renderMode1();
}
function renderMode1(){
  const q = m1Questions[m1.qIdx];
  const cur = q.placements[m1.pIdx];
  let sentence = "";
  for(let gap=0; gap<=q.parts.length; gap++){
    if(m1.placedAt[gap]) sentence += `<span class="placed">${m1.placedAt[gap].join("")}</span>`;
    if(cur) sentence += `<button class="gap-btn" onclick="m1Tap(${gap})"></button>`;
    if(gap < q.parts.length) sentence += `<span class="chunk">${q.parts[gap]}</span>`;
  }
  app.innerHTML = `
    ${topBar()}
    <div class="rule-tip">💡 ${q.rule}</div>
    <div class="card">
      <div class="sentence-area" id="m1-sentence">${sentence}</div>
      <div class="tray">${cur
        ? `つぎに おく きごう <span class="sym">${cur.sym}</span> … ○を タップしてね`
        : ""}</div>
    </div>
    <p class="center" style="color:#8a7b6c;">もんだい ${m1.qIdx+1} ／ ${m1Questions.length}</p>`;
}
function m1Tap(gap){
  const q = m1Questions[m1.qIdx];
  const cur = q.placements[m1.pIdx];
  if(gap === cur.pos){
    if(!m1.placedAt[gap]) m1.placedAt[gap] = [];
    m1.placedAt[gap].push(cur.sym);
    m1.pIdx++;
    if(m1.pIdx >= q.placements.length){
      addStars(1);
      confetti();
      renderM1Praise(q);
    } else {
      renderMode1();
    }
  } else {
    toast("うーん、そこじゃ ないみたい 🤔");
    const el = document.getElementById("m1-sentence");
    el.classList.remove("shake"); void el.offsetWidth; el.classList.add("shake");
  }
}
function renderM1Praise(q){
  let sentence = "";
  for(let gap=0; gap<=q.parts.length; gap++){
    if(m1.placedAt[gap]) sentence += `<span class="placed">${m1.placedAt[gap].join("")}</span>`;
    if(gap < q.parts.length) sentence += `<span class="chunk">${q.parts[gap]}</span>`;
  }
  const last = m1.qIdx >= m1Questions.length - 1;
  app.innerHTML = `
    ${topBar()}
    <div class="card center">
      <div style="font-size:50px;">🎉</div>
      <div class="sentence-area">${sentence}</div>
      <p style="font-size:23px;">${q.praise}</p>
      <p>⭐を 1こ ゲット！</p>
      <button class="next-btn" onclick="${last ? "m1Finish()" : "m1Next()"}">
        ${last ? "クリア！ 🏆" : "つぎの もんだいへ ▶"}</button>
    </div>`;
}
function m1Next(){
  m1.qIdx++; m1.pIdx = 0; m1.placedAt = {};
  renderMode1();
}
function m1Finish(){ save.m1done.kihon = true; persist(); renderM1Hub(); }

/* --- ステージ2 : いみが かわる！てん（きょうかしょ「点をうたないと…」のれい） --- */
const tenQuests = [
  { s:"このみせではきものをかう", cands:[4,5], ans:5, emoji:"👘",
    goal:"おみせで きものを かう",

/* --- ます目（たてがき）ユーティリティ --- */
function decoChar(ch){
  if(ch === "、" || ch === "。") return `<span class="tr">${ch}</span>`;
  if(ch === "「" || ch === "」" || ch === "ー") return `<span class="rot">${ch}</span>`;
  return ch || "";
}
function textToGrid(paras, rows){
  // 。、」が行頭に来る場合は前の行にぶら下げる（行頭禁則）
  const cols = [];
  paras.forEach(p => {
    let col = [];
    [...p].forEach(ch => {
      if(col.length >= rows && !"。、」".includes(ch)){ cols.push(col); col = []; }
      col.push(ch);
    });
    if(col.length) cols.push(col);
  });
  return cols;
}
function gridHTML(cols, rows, small){
  const cls = small ? "masu small" : "masu";
  return `<div class="masu-wrap">${cols.map(col => {
    let cells = col.map(ch => `<div class="${cls}">${decoChar(ch)}</div>`).join("");
    for(let i = col.length; i < rows; i++) cells += `<div class="${cls}"></div>`;
    return `<div class="masu-col">${cells}</div>`;
  }).join("")}</div>`;
}

const masuLineDefs = [
  "せんせいにきいてみたら[、]",
  "[「]それは[、]さるすべりのき",
  "ですよ[。][」]",
  "とおしえてくれました[。]"
];
function parseMasuLine(def){
  const cells = [];
  for(let i = 0; i < def.length; i++){
    if(def[i] === "["){ cells.push({ ans:def[i+1], filled:false }); i += 2; }
    else cells.push({ ch:def[i] });
  }
  return cells;
}

function renderMasuChoice(){

  const wrong = gridHTML(textToGrid(["おかあさんが、「いってらっしゃい。」といいました。"], 11), 11, true);

function masuChoice(ok){
  if(ok){
    addStars(1); confetti();

        <div style="font-size:46px;">⭕</div>

        <p>つぎは、きょうかしょに でてくる ${R("文","ぶん")}で しゅぎょうだ！</p>

function renderMasuFill(){
  if(!mc.cells){ mc.cells = masuLineDefs.map(parseMasuLine); mc.sel = null; }
  const rows = 12;
  const done = mc.cells.flat().every(c => !c.ans || c.filled);
  const grid = `<div class="masu-wrap">${mc.cells.map((col,ci)=>{
    let cells = col.map((cell,ri)=>{
      if(cell.ans && !cell.filled)
        return `<div class="masu blank" id="masu-${ci}-${ri}" onclick="masuTap(${ci},${ri})"></div>`;
      if(cell.ans)
        return `<div class="masu ok">${decoChar(cell.ans)}</div>`;
      return `<div class="masu">${decoChar(cell.ch)}</div>`;
    }).join("");
    for(let i = col.length; i < rows; i++) cells += `<div class="masu"></div>`;
    return `<div class="masu-col">${cells}</div>`;
  }).join("")}</div>`;
  app.innerHTML = `
    ${topBar()}
    ${done ? "" : `<div class="rule-tip">💡 ${R("丸","まる")}（。）、${R("点","てん")}（、）、かぎ（「」）は、それぞれ ${R("一","ひと")}ますに かきます。<br>👇 きごうを えらんでから、てんせんの ますを タップ！</div>`}
    <div class="card">${grid}</div>

        <div style="font-size:46px;">🎉</div>
        <p style="font-size:24px;">きょうかしょと おなじ ${R("文","ぶん")}が かけたね！</p>
        <p>かいわは ${R("行","ぎょう")}を かえて、「〜。」の 。も 」も ${R("一","ひと")}ますに かけたね。</p>
        <button class="next-btn" onclick="masuDone()">クリア！ 🏆</button>
      </div>` : `
      <div class="sym-tray">
        ${["。","、","「","」"].map(s=>`<button class="sym-btn ${mc.sel===s?"sel":""}" onclick="masuSel('${s}')">${s}</button>`).join("")}
      </div>`}`;
}
function masuSel(s){ mc.sel = s; renderMasuFill(); }
function masuTap(ci,ri){
  const cell = mc.cells[ci][ri];

    if(el){ el.classList.remove("shake"); void el.offsetWidth; el.classList.add("shake"); }
  }
}

      <button class="next-btn" onclick="startMode2()">べつの おはなしも ふくらませる</button><br>
      <button class="home-btn" style="margin-top:14px;" onclick="renderHome()">🏠 ホームに もどる</button>
    </div>`;
}

/* =========================================================
   MODE 3 : きもちことば あつめ
   ========================================================= */
const m3Scenes = [
  { emoji:"🏃🥇", text:`かけっこで ${R("一","いっ")}とうに なった！`,
    answer:`とび${R("上","あ")}がるくらい うれしかった`,
    wrong:["しょんぼり した","こわかった"],
    word:"うれしい", family:["にこにこ","やったあ！","スキップしたく なる"] },
  { emoji:"🎒🌄", text:`あしたは えんそくの ${R("日","ひ")}！`,
    answer:"わくわく する",
    wrong:["かなしい","のんびり する"],
    word:"わくわく", family:["うきうき","たのしみ","ねむれないくらい"] },
  { emoji:"👻🏚️", text:"おばけやしきに はいった…",
    answer:"どきどき した",
    wrong:["うきうき した","すっきり した"],
    word:"どきどき", family:["こわい","ひやひや","ぶるぶる"] },
  { emoji:"💥😲", text:`うしろから きゅうに ${R("大","おお")}きな おとが した！`,
    answer:"びっくり した",
    wrong:["ゆったり した","うっとり した"],
    word:"びっくり", family:["とびあがる","めが まんまる","むねが ドキン"] },
  { emoji:"😢✏️", text:"たいせつな けしごむを なくして しまった…",
    answer:"しょんぼり した",
    wrong:["わくわく した","にっこり した"],
    word:"しょんぼり", family:["かなしい","がっかり","なみだが でそう"] },
  { emoji:"🚚👋", text:"なかよしの ともだちが、とおくへ ひっこして いく…",
    answer:"さみしかった",
    wrong:["うれしかった","おなかが すいた"],
    word:"さみしい", family:["あいたく なる","むねが きゅっと なる","しんみり"] }
];
let m3 = null;

function startMode3(){
  m3 = { idx:0 };
  renderM3Scene();
}
function renderM3Scene(){
  if(m3.idx >= m3Scenes.length){
    confetti();
    app.innerHTML = `
      ${topBar()}
      <div class="card center">
        <div style="font-size:50px;">🏆</div>
        <p style="font-size:25px;">きもちことばを ぜんぶ あつめたね！</p>
        <p>「たのしかったです」いがいの ことばが、こんなに あるんだね。</p>
        <button class="next-btn" onclick="renderZukan()">📖 ずかんを 見る</button>
      </div>`;
    return;
  }
  const sc = m3Scenes[m3.idx];
  const opts = [sc.answer, ...sc.wrong].sort(()=>Math.random()-0.5);
  app.innerHTML = `
    ${topBar()}
    <div class="scene-card">
      <div class="scene-emoji">${sc.emoji}</div>
      <div class="scene-text">${sc.text}</div>
    </div>
    <div class="q-card" style="border-color:#8fce8f;">
      <span class="cat-chip" style="background:#6bb56b;">💗 ぴったりの きもちは？</span>
      <div class="opts">
        ${opts.map(o=>`<button class="opt-btn" onclick="m3Pick(this)" data-ok="${o===sc.answer}">${o}</button>`).join("")}
      </div>
    </div>
    <p class="center" style="color:#8a7b6c;">もんだい ${m3.idx+1} ／ ${m3Scenes.length}</p>`;
}
function m3Pick(btn){
  const sc = m3Scenes[m3.idx];
  if(btn.dataset.ok === "true"){
    if(!save.zukan.includes(m3.idx)){ save.zukan.push(m3.idx); }
    addStars(1);
    confetti();
    app.innerHTML = `
      ${topBar()}
      <div class="card center">
        <div style="font-size:46px;">${sc.emoji}</div>
        <p style="font-size:26px;">「<b>${sc.answer}</b>」 ぴったり！</p>
        <div class="family-box">
          📖 <b>${sc.word}</b> の なかまことば：<br>
          ${sc.family.join("　・　")}
        </div>
        <p style="margin-top:10px;">ずかんに とうろく されたよ！</p>
        <button class="next-btn" onclick="m3.idx++; renderM3Scene();">つぎへ ▶</button>
      </div>`;
  } else {
    toast("うーん、その きもちかなあ？ 🤔");
    btn.classList.remove("shake"); void btn.offsetWidth; btn.classList.add("shake");
  }
}

/* =========================================================
   MODE 4 : じぶんの ぶんで ちょうせん（ふくらむせんせい）
   ローカル辞書＋ヒューリスティックによる作文フィードバック
   ========================================================= */
const COACH_CATS = [
  { id:"color", icon:"🎨", label:"いろ",
    words:["きいろ","きんいろ","ぎんいろ","みどり","ちゃいろ","むらさき","ピンク","オレンジ","はいいろ","みずいろ","まっか","まっさお","まっしろ","まっくろ","赤","青","白","黒"],
    regex:/(あか|あお|しろ|くろ)(い|く|かった)/g,
    eg:"まっかな りんご" },
  { id:"size", icon:"📏", label:"おおきさ",
    words:[],
    regex:/(おおき|ちいさ|たか|ひく|なが|みじか|ふと|ほそ|ひろ|大き|小さ|広|太|細|高|長)(い|な|く|かった)/g,
    eg:`ぞうみたいに ${R("大","おお")}きい` },
  { id:"shape", icon:"🔺", label:"かたち",
    words:["まんまる","さんかく","しかく","ほしがた","ハート","ぐるぐる","ぎざぎざ","でこぼこ","とんがっ"],
    regex:/(まる|丸)(い|く|かった)/g,
    eg:"まんまるの おつきさま" },
  { id:"num", icon:"🔢", label:"かず",
    words:["たくさん","いっぱい","すこし","ちょっと","はんぶん","ぜんぶ","みんなで","ひとつ","ふたつ","みっつ","よっつ","いつつ"],
    regex:/[0-9０-９一二三四五六七八九十百]+[ 　]?(かい|こ|ほん|ぼん|ぽん|まい|ひき|びき|ぴき|とう|にん|さつ|だい|わ|そく|ど|つ|ねん)/g,
    eg:`${R("三","さん")}かいも すべった` },
  { id:"oto", icon:"👂", label:"おと・ようす",
    words:["ふわふわ","きらきら","ぴかぴか","つるつる","ざらざら","ぽかぽか","ひんやり","ビュンビュン","びゅんびゅん","ビューン","シュー","ゴロゴロ","ごろごろ","ワンワン","わんわん","ニャー","にゃー","もぐもぐ","むしゃむしゃ","ゆらゆら","パタパタ","ぱたぱた","ドキン","ドンドン","トントン","サラサラ","さらさら","ベタベタ","べたべた","カチカチ","ぶるぶる","そよそよ","ぺこぺこ","ぐうぐう","すやすや","ぴょんぴょん","ばしゃばしゃ","ジャブジャブ","じゃぶじゃぶ"],
    eg:"かぜが ビュンビュン" },
  { id:"kaiwa", icon:"💬", label:"「」かいわ",
    regex:/「[^「」]+」/g,
    eg:"「もう いっかい やろう。」" },
  { id:"feel", icon:"💗", label:"きもち",
    words:["うれし","たのし","わくわく","どきどき","ドキドキ","うきうき","るんるん","びっくり","おどろ","しょんぼり","がっかり","さみし","さびし","くやし","ほっと","はずかし","ゆかい","しあわせ","だいすき","大すき","とびあがる","とび上がる","なきそう","なみだが"],
    regex:/こわ(い|かった|くて|そう)/g,
    eg:"むねが どきどきした" }
];

let m4 = { text:"", best:0 };

function startMode4(){ renderM4Input(); }

function renderM4Input(){
  app.innerHTML = `
    ${topBar()}
    <h1 class="title" style="font-size:26px;">👓 ふくらむせんせいに みてもらおう</h1>
    <p class="subtitle">きょうの できごとや すきな ことを、じぶんの ことばで かいてみよう。</p>
    <textarea class="write-area" id="m4-text" placeholder="（れい）きのう、こうえんに いきました。">${escapeHtml(m4.text)}</textarea>
    <div class="center" style="margin-top:14px;">
      <button class="next-btn" onclick="m4Check()">👓 みてもらう！</button><br>
      <button class="home-btn" style="margin-top:12px;" onclick="m4Sample()">れいぶんを いれてみる</button>
    </div>`;
}
function m4Sample(){
  m4.text = "きのう、こうえんにいきました。すべりだいをしました。たのしかったです。";
  renderM4Input();
}
function m4Check(){
  const el = document.getElementById("m4-text");
  const text = (el ? el.value : "").trim();
  if(!text){ toast("まだ なにも かいてないよ ✏️"); return; }
  m4.text = text;
  renderM4Result(analyzeText(text));
}

function analyzeText(text){
  const found = {};
  COACH_CATS.forEach(cat => {
    const hits = [];
    (cat.words || []).forEach(w => { if(text.includes(w)) hits.push(w); });
    if(cat.regex){
      const m = text.match(cat.regex);
      if(m) m.forEach(x => hits.push(x));
    }
    if(hits.length) found[cat.id] = [...new Set(hits)];
  });
  const sentences = text.split(/[。！!？?]/).map(s => s.trim()).filter(s => s);
  return {
    text,
    found,
    score: Object.keys(found).length,
    sentences: sentences.length,
    maru: /。/.test(text),
    ten: /、/.test(text),
    endOk: /[。！？」]\s*$/.test(text),
    kagi: /「[^「」]*」/.test(text),
    kagiMaru: /。」/.test(text),
    saidWord: /(いいました|いった|いってました|ききました|さけびました)/.test(text),
    onlyTanoshi: !!(found.feel && found.feel.every(w => w.startsWith("たのし")) && /たのしかった/.test(text))
  };
}

function quoteHit(text, w){
  // 語幹マッチを文中の自然な形まで伸ばして引用する（例: たのし → たのしかった）
  const esc = w.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  const m = text.match(new RegExp(esc + "[いかったくてなに]{0,4}"));
  return m ? m[0] : w;
}

function renderM4Result(a){
  if(a.score > m4.best){ addStars(a.score - m4.best); m4.best = a.score; }
  const title = a.score <= 2 ? "これから もっと ふくらむぞ！"
              : a.score <= 4 ? "いい かんじに ふくらんできた！"
              : "ぱんぱんに ふくらんだ！ すごい！";
  const badges = COACH_CATS.map(c =>
    `<div class="badge ${a.found[c.id] ? "on" : ""}"><span class="b-icon">${c.icon}</span>${c.label}</div>`).join("");
  const finds = COACH_CATS.filter(c => a.found[c.id]).map(c =>
    `<div class="find-line">${c.icon} ${c.label}の ことば「<b>${a.found[c.id].slice(0,3).map(w => escapeHtml(quoteHit(a.text, w))).join("」「")}</b>」が つかえたね！</div>`).join("");
  const chances = [];
  if(a.sentences <= 3) chances.push(`<div class="chance-line">🎈 「${R("中","なか")}」を もう ${R("一","いち")}${R("文","ぶん")}！ 「だれと？」「どんな いろ？」「なんかい？」に こたえる ${R("文","ぶん")}を たしてみよう。</div>`);
  if(a.onlyTanoshi){
    const zw = save.zukan.map(i => m3Scenes[i].word);
    chances.push(`<div class="chance-line">💗 「たのしかったです」を きみだけの きもちに かえてみよう！ ${zw.length ? `ずかんで あつめた 「${zw.slice(0,3).join("」「")}」も つかえるよ。` : "（れい）むねが わくわくしました。"}</div>`);
  }
  COACH_CATS.filter(c => !a.found[c.id]).slice(0,2).forEach(c => {
    chances.push(`<div class="chance-line">${c.icon} ${c.label}の ことばを たしてみよう。（れい）${c.eg}</div>`);
  });
  const pen = [];
  pen.push(a.maru && a.endOk
    ? `⭕ ${R("丸","まる")}（。）が ${R("文","ぶん")}の おわりに つけられているね。`
    : `✏️ ${R("文","ぶん")}の おわりには ${R("丸","まる")}（。）を つけよう。`);
  pen.push(a.ten
    ? `⭕ ${R("点","てん")}（、）で ${R("切","き")}れ${R("目","め")}が つくれているね。`
    : `✏️ ${R("文","ぶん")}の ${R("中","なか")}の ${R("切","き")}れ${R("目","め")}に ${R("点","てん")}（、）を うってみよう。`);
  if(a.kagi){
    pen.push(a.kagiMaru
      ? `⭕ かいわの 「〜。」の かきかたも ばっちり！`
      : `✏️ かぎの 」の まえにも 。を つけよう。（れい）「やったね。」`);
  } else if(a.saidWord){
    pen.push(`✏️ ${R("話","はな")}した ことばには かぎ（「」）を つけよう。`);
  }
  app.innerHTML = `
    ${topBar()}
    <div class="balloon-row" style="height:110px;">
      <span class="balloon" style="transform:scale(${0.7 + a.score*0.1});">${a.score >= 5 ? "😄" : "🙂"}🎈</span>
      <div class="meter-wrap">
        <div class="meter-label">ふくらませメーター ${a.score} ／ ${COACH_CATS.length}</div>
        <div class="meter"><div style="width:${Math.round(a.score/COACH_CATS.length*100)}%"></div></div>
      </div>
    </div>
    <h1 class="title" style="font-size:25px; margin:4px 0 10px;">👓 ${title}</h1>
    <div class="card"><div class="badge-grid">${badges}</div></div>
    ${finds ? `<div class="card"><p style="font-size:20px;">✨ <b>みつけたよ</b></p>${finds}</div>` : ""}
    ${chances.length ? `<div class="card"><p style="font-size:20px;">🎈 <b>ふくらませチャンス</b></p>${chances.join("")}</div>` : ""}
    <div class="rule-tip">✏️ <b>まる・てん・かぎ チェック</b><br>${pen.join("<br>")}</div>
    <div class="center">
      <button class="next-btn" onclick="renderM4Input()">✏️ なおして もういちど</button><br>
      ${ttsOk ? `<button class="home-btn" style="margin-top:12px;" onclick="m4Speak()">🔊 よんでもらう</button>` : ""}
      <button class="home-btn" style="margin-top:12px;" onclick="renderHome()">🏠 ホーム</button>
    </div>`;
}
function m4Speak(){ speak(m4.text); }

/* ---------- zukan ---------- */
function renderZukan(){
  app.innerHTML = `
    ${topBar()}
    <h1 class="title" style="font-size:28px;">📖 きもちことば ずかん</h1>
    <p class="subtitle">あつめた ことばは、さくぶんで つかってみよう！</p>
    <div class="zukan-grid">
      ${m3Scenes.map((sc,i)=> save.zukan.includes(i)
        ? `<div class="zukan-card">
             <div class="zukan-word">${sc.emoji.slice(0,2)} ${sc.word}</div>
             <div class="zukan-family">なかま： ${sc.family.join("・")}</div>
           </div>`
        : `<div class="zukan-card locked">？？？</div>`).join("")}
    </div>
    <div class="center" style="margin-top:20px;">
      <button class="next-btn" onclick="startMode3()">💗 ことばを あつめに いく</button>
    </div>`;
}

renderHome();
</script>
